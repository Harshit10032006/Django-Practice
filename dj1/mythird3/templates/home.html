<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        nav{
            background:#222;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 50px;
        }

        nav .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:25px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }

        nav ul li a:hover{
            color:#00bfff;
        }

        .hero{
            height:80vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
            color:#333;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            color:#666;
            margin-bottom:30px;
        }

        .hero button{
            padding:12px 25px;
            border:none;
            border-radius:5px;
            background:#007bff;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .hero button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MySite</div>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Welcome to My Django Website</h1>
        <p>Learn Django by building real-world projects.</p>
        <button>Get Started</button>
    </section>

</body>
</html>
